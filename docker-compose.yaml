name: 0bt

# Default `docker compose up -d` brings up app + transmission for plain HTTP
# on $APP_PORT (8080 by default). For a TLS production deployment, also enable
# the `caddy` profile and set CADDY_DOMAIN + FHOST_BASE_URL:
#
#   docker compose --profile caddy up -d
#
# See docs/deploy-hetzner.md for the full VPS walkthrough.

services:
  app:
    build: .
    image: 0bt-app:local
    restart: unless-stopped
    env_file: [.env]
    environment:
      FHOST_STORAGE_PATH: /data/up
      FHOST_DB_URL: ${FHOST_DB_URL:-sqlite:////data/db/0bt.sqlite}
      FHOST_BASE_URL: ${FHOST_BASE_URL:-http://localhost:8080}
      FHOST_TRACKERS: ${FHOST_TRACKERS:-}
      FHOST_INTERNAL_TRACKER: ${FHOST_INTERNAL_TRACKER:-}
      TRANSMISSION_RPC_HOST: transmission
      TRANSMISSION_RPC_PORT: 9091
    volumes:
      - app_data:/data
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      transmission:
        condition: service_started
    networks: [zerobt]

  transmission:
    image: linuxserver/transmission:4.0.6
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      USER: ${TRANSMISSION_RPC_USER:-transmission}
      PASS: ${TRANSMISSION_RPC_PASSWORD:-change-me-or-die}
    volumes:
      - app_data:/data
      - transmission_config:/config
      - transmission_watch:/watch
    ports:
      - "${BT_PEER_PORT:-51413}:51413"
      - "${BT_PEER_PORT:-51413}:51413/udp"
    networks: [zerobt]

  caddy:
    image: caddy:2
    profiles: ["caddy"]
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      app:
        condition: service_started
    networks: [zerobt]

volumes:
  app_data:
  transmission_config:
  transmission_watch:
  caddy_data:
  caddy_config:

networks:
  zerobt:
    driver: bridge
